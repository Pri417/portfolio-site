<style>
/* Hero script intro: force the whole line (incl. any pasted text that carries
   its own inline font/background) to the script font with no background box. */
.hero-script, .hero-script * {
  font-family: var(--font-script) !important;
  background: transparent !important;
  background-color: transparent !important;
}
/* Strip any white highlight pasted into editable text anywhere on the page. */
.cs-editable [style*="background"] { background: transparent !important; }
/* Bio: always render in the body font (Plus Jakarta Sans), even if text was
   pasted in carrying its own font; keeps bold/colour accents intact. */
.cs-it-grid [data-placeholder="Write a little about yourself…"],
.cs-it-grid [data-placeholder="Write a little about yourself…"] * {
  font-family: var(--font-ui) !important;
}
/* Bulletin-board polaroids: sit at a tilt, straighten + lift on hover. */
.board-pola {
  transform: rotate(var(--rot));
  transition: transform .4s cubic-bezier(.5,1.5,.4,1), box-shadow .3s;
  will-change: transform;
}
.board-pola:hover {
  transform: rotate(0deg) translateY(-12px) scale(1.045) !important;
  box-shadow: 0 30px 52px rgba(40,28,16,0.40), 0 8px 14px rgba(40,28,16,0.22) !important;
  z-index: 20;
}
</style>
