<!doctype html>
<html lang="en">
<head>
<link rel="preload" href=".imgslots-site.state.json" as="fetch" crossorigin="anonymous">
<meta charset="utf-8" />
<title>Resume — Pri Jain</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="site.css?v=20">
<style>
  /* site.css makes <body> a flex row that centers a single child, so the whole
     page lives inside one full-width wrapper. To update the resume: drop a new
     PDF and I'll refresh the inline image + the linked Pri-Jain-Resume.pdf. */
  .rz-page { width: 100%; }
  .rz-wrap { max-width: 820px; margin: 0 auto; padding: 6px 24px 80px; }
  .rz-head { text-align: center; margin: 4px 0 26px; }
  .rz-title {
    margin: 0; font-family: var(--font-headline);
    font-variation-settings: "opsz" 144, "SOFT" 60, "wght" 600;
    font-size: clamp(42px, 6vw, 72px); line-height: 1; letter-spacing: -0.02em;
    color: var(--orange);
  }
  .rz-sub {
    font-family: var(--font-script); font-weight: 700;
    font-size: clamp(22px, 2.4vw, 30px); color: var(--ink-soft); margin-top: 6px;
  }
  .rz-frame {
    position: relative; width: 100%;
    margin: 0 auto; background: #fff;
    border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden;
    box-shadow: 0 30px 60px rgba(46,37,34,0.14), 0 6px 14px rgba(46,37,34,0.06);
  }
  .rz-frame > a.rz-pdf { display: block; }
  .rz-frame img { width: 100%; height: auto; display: block; }
  /* Transparent clickable hotspots layered over the printed URLs in the resume
     image. Percentages track the image as it scales responsively. */
  .rz-hot {
    position: absolute; z-index: 2; display: block;
    border-radius: 4px;
    background: transparent; transition: background .15s, box-shadow .15s;
  }
  .rz-hot:hover {
    background: rgba(230, 62, 30, 0.14);
    box-shadow: 0 0 0 2px rgba(230, 62, 30, 0.35);
  }
</style>
</head>
<body>
  <div class="rz-page">
    <div id="rz-nav"></div>

    <div class="rz-wrap">
      <div class="rz-head">
        <h1 class="rz-title">Resume</h1>
        <div class="rz-sub">Proof that a lot can happen in one page</div>
      </div>

      <div class="rz-frame">
        <a class="rz-pdf" href="Pri-Jain-Resume.pdf" target="_blank" rel="noopener noreferrer" title="Open the full PDF">
          <img src="resume-page.jpg" alt="Priyanka Jain — Resume" />
        </a>
        <a class="rz-hot" href="mailto:prij2102@gmail.com" title="Email me"
           style="top: 7.0%; left: 17.6%; width: 16.2%; height: 2.7%;"></a>
        <a class="rz-hot" href="https://linkedin.com/in/pri-jain" target="_blank" rel="noopener noreferrer" title="LinkedIn"
           style="top: 7.0%; left: 48.7%; width: 18.6%; height: 2.7%;"></a>
        <a class="rz-hot" href="https://pjaindesign.com" target="_blank" rel="noopener noreferrer" title="Portfolio — pjaindesign.com"
           style="top: 7.0%; left: 68.8%; width: 13.6%; height: 2.7%;"></a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="scrapbook-shared.jsx?v=20"></script>
  <script type="text/babel" src="landing.jsx?v=20"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('rz-nav'))
      .render(<window.SiteNav active="resume" />);
  </script>
</body>
</html>
