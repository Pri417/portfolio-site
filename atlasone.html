// Patch problem + approach sections to ensure fit:contain (natural mode)
(function(){
  try {
    var key = 'cs:atlasone:sections';
    var sections = JSON.parse(localStorage.getItem(key));
    if (!sections) return;
    var changed = false;
    sections = sections.map(function(s) {
      if (s.id === 'problem' && !s.ar) {
        changed = true;
        return Object.assign({}, s, { ar: 0.6625310173697271 });
      }
      if (s.id === 'approach' && !s.ar) {
        changed = true;
        return Object.assign({}, s, { ar: 0.44991364421416236, img2Ar: 0.6101694915254238, pair: true, pairH: 500 });
      }
      if (s.id === 'workflow-1') {
        changed = true;
        return Object.assign({}, s, { noBg: true });
      }
      if (s.id === 'workflow-2') {
        changed = true;
        return Object.assign({}, s, { maxW: 880, noBg: true });
      }
      if (s.id === 'workflow-3') {
        changed = true;
        return Object.assign({}, s, { maxW: 700 });
      }
      return s;
    });
    if (changed) localStorage.setItem(key, JSON.stringify(sections));
  } catch(e){}
})();

// Patch next to point to Halloween Academy
(function(){
  try {
    var key = 'cs:atlasone:next';
    var next = JSON.parse(localStorage.getItem(key));
    next = Object.assign({}, next || {}, { label: 'Next Project', title: 'Halloween Academy', href: 'halloween-academy.html', img: '' });
    localStorage.setItem(key, JSON.stringify(next));
  } catch(e){}
})();
(function(){
  try {
    var key = 'cs:atlasone:meta';
    var meta = JSON.parse(localStorage.getItem(key));
    if (!meta) return;
    var hasPartners = meta.some(function(m){ return m.label === 'Partners'; });
    if (!hasPartners) {
      meta.push({ label: 'Partners', value: 'Add partners here' });
      localStorage.setItem(key, JSON.stringify(meta));
    }
  } catch(e){}
})();
</script>
